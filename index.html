<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMANDO BALISTIK</title>
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <div id="boot">
        <div>
            <h1>KOMANDO BALISTIK</h1>
            <div class="bline"></div>
            <p>WASD · GERAK &nbsp;|&nbsp; TETIKUS · LIHAT<br>
               PETA · ATUR TARGET &amp; TEMBAK<br>
               T · PERCEPAT WAKTU &nbsp;|&nbsp; GULIR · PERBESAR<br>
               KLIK PETA → ATUR TARGET → TEMBAK</p>
            <button id="boot-btn">MULAI</button>
        </div>
    </div>

    <div id="flash"></div>
    <div id="vig"></div>
    <div id="xh"></div>

    <div id="hud">
        <div id="htl">SISTEM SIAP<br><span id="timeLbl">—</span></div>
        <div id="htr">PENERBANGAN&nbsp;<span id="flightLbl">0</span><br>TOTAL TEMBAKAN&nbsp;<span id="firedLbl">0</span></div>
        <div id="hbl">WASD GERAK · GULIR ZOOM · T WAKTU<br>KLIK PETA → ATUR TARGET → TEMBAK</div>
    </div>

    <div id="map-panel">
        <div id="map-header">
            <span id="map-title">TAMPILAN TAKTIS</span>
            <button id="btn-toggle-map">_</button>
        </div>
        <div id="map-body">
            <div id="map-wrap">
                <canvas id="map-canvas" width="240" height="240"></canvas>
                <div id="map-scale">0&nbsp;&nbsp;━━━━&nbsp;&nbsp;500m</div>
            </div>
            <div id="map-controls">
                <label>RUDAL</label>
                <button class="map-btn" id="btn-minus">−</button>
                <span id="count-display">06</span>
                <button class="map-btn" id="btn-plus">+</button>
                <button id="btn-fire" class="ready">TEMBAK</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
